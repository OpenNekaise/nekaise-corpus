# nekaise-corpus — building / HVAC / building-energy registry (the curated seed).
# Maintain THIS file: add entries below, then run `python build_corpus.py`.
# find_sources.py and crawl_docs.py also append discovered entries here; prune_corpus.py gates them.
#
# fields per source:
#   id       stable slug (becomes raw/<source>/<id>.<ext> and text/<id>.md)
#   title    human label
#   url      direct download URL
#   source   bucket for raw/ subfolder (gov_pnnl, gov_nrel, arxiv, wikipedia, web)
#   license  public-domain | cc-by | cc-by-sa | open | proprietary-internal
#   topic    controls_bas | commissioning_fdd | equipment_systems | standards_protocols | building_energy
#   format   pdf | html
#
# NOTE: some URLs may 404 / move; the build logs failures and keeps going.
# Fix or drop dead entries and re-run.

