name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml pytest
      - name: compile all scripts
        run: python -m py_compile scripts/*.py
      - name: lint registry + manifest
        run: python scripts/lint_registry.py
      - name: golden tests (quality gate + registry I/O)
        run: pytest tests/ -q
